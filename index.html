<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Badminton Tournament</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #22c55e;
    --accent-2: #16a34a;
    --warn: #ef4444;
    --shadow: 0 10px 30px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }
  h1 { margin: 0 0 6px; font-size: 28px; }
  h2 { margin: 24px 0 12px; font-size: 20px; }
  h3 { margin: 0 0 8px; font-size: 16px; color: var(--muted); font-weight: 500; }
  .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
  .panel { background: var(--panel); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  input[type="text"] { background: var(--panel-2); border: 1px solid #475569; color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 14px; flex: 1; min-width: 160px; }
  input[type="text"]:focus { outline: 2px solid var(--accent); border-color: transparent; }
  button { background: var(--accent); color: #052e16; border: 0; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
  button:hover { background: var(--accent-2); }
  button.secondary { background: var(--panel-2); color: var(--text); }
  button.secondary:hover { background: #475569; }
  button.danger { background: var(--warn); color: #fff; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .player-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .pill { background: var(--panel-2); padding: 6px 12px; border-radius: 999px; font-size: 13px; display: inline-flex; gap: 6px; align-items: center; }
  .pill button { background: transparent; color: var(--muted); padding: 0 0 0 4px; font-size: 16px; line-height: 1; }
  .pill button:hover { color: var(--warn); background: transparent; }
  .teams { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-top: 12px; }
  .team { background: var(--panel-2); border-radius: 10px; padding: 16px; }
  .team-title { font-weight: 600; margin-bottom: 6px; font-size: 15px; color: var(--accent); }
  .bye { color: var(--muted); font-style: italic; }
  .match { background: var(--panel-2); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .match-header .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .match-status { font-size: 12px; padding: 4px 8px; border-radius: 6px; background: #475569; }
  .match-status.live { background: #facc15; color: #422006; }
  .match-status.done { background: var(--accent); color: #052e16; }
  .sides { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
  .side { text-align: center; }
  .side.left { text-align: right; }
  .side-name { font-weight: 600; margin-bottom: 4px; min-height: 20px; }
  .side-players { color: var(--muted); font-size: 12px; min-height: 18px; }
  .score { font-size: 36px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 50px; text-align: center; }
  .score-controls { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .score-controls button { padding: 6px 12px; font-size: 13px; }
  .games { display: flex; gap: 8px; justify-content: center; margin-top: 8px; font-size: 12px; color: var(--muted); }
  .game-pill { background: #0f172a; padding: 2px 6px; border-radius: 4px; }
  .empty { color: var(--muted); font-style: italic; padding: 12px 0; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .standings { width: 100%; border-collapse: collapse; font-size: 14px; }
  .standings th, .standings td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--panel-2); }
  .standings th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
  .standings tr.winner td { color: var(--accent); font-weight: 600; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--warn); color: #fff; padding: 10px 16px; border-radius: 8px; box-shadow: var(--shadow); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .footer-note { color: var(--muted); font-size: 12px; text-align: center; margin-top: 24px; }
  .section-title-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>🏸 Badminton Tournament</h1>
  <div class="subtitle">Doubles round-robin · BWF scoring (best of 3 to 21)</div>

  <div class="panel">
    <h2>1. Players</h2>
    <div class="row">
      <input type="text" id="playerInput" placeholder="Enter player name and press Enter or Add" />
      <button id="addPlayerBtn">Add</button>
      <button class="secondary" id="clearPlayersBtn">Clear All</button>
    </div>
    <div class="player-list" id="playerList"></div>
    <div class="empty" id="playerEmpty">No players added yet. Add at least 4 to start.</div>
  </div>

  <div class="panel">
    <div class="section-title-row">
      <h2>2. Round</h2>
      <div class="actions">
        <button id="shuffleBtn" disabled>🎲 Shuffle Teams</button>
        <button class="secondary" id="newRoundBtn" disabled>Next Round</button>
      </div>
    </div>
    <div id="teamsArea"></div>
  </div>

  <div class="panel">
    <h2>3. Matches</h2>
    <div id="matchesArea"></div>
  </div>

  <div class="panel">
    <div class="section-title-row">
      <h2>4. Standings</h2>
      <div class="actions">
        <button class="secondary" id="undoBtn" disabled>↶ Undo Last Point</button>
        <button class="secondary" id="exportBtn">Export</button>
        <button class="danger" id="resetBtn">Reset Tournament</button>
      </div>
    </div>
    <div id="standingsArea"></div>
  </div>

  <div class="footer-note">Saved automatically in your browser.</div>
</div>
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'badminton-tournament-v1';
  const GAMES_TO_WIN = 2; // best of 3
  const POINTS_PER_GAME = 21;
  const SIDE_SWITCH = 11; // game 3 only

  const defaultState = () => ({
    players: [],
    rounds: [],   // each: { number, teams: [[p1,p2], ...], matches: [{id, a:[p1,p2], b:[p1,p2], games:[{a,b,winner}], winner:null}] }
    history: [],  // for undo
  });

  let state = load();

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      const parsed = JSON.parse(raw);
      return { ...defaultState(), ...parsed };
    } catch (e) {
      return defaultState();
    }
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  function uid() { return Math.random().toString(36).slice(2, 10); }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function showError(msg) { toast(msg); }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  window.addEventListener('error', e => {
    toast('Something went wrong: ' + (e.message || 'unknown error'));
  });

  // ---- Players ----
  const playerInput = document.getElementById('playerInput');
  const addPlayerBtn = document.getElementById('addPlayerBtn');
  const clearPlayersBtn = document.getElementById('clearPlayersBtn');
  const playerList = document.getElementById('playerList');
  const playerEmpty = document.getElementById('playerEmpty');

  function addPlayer() {
    const name = playerInput.value.trim();
    if (!name) return;
    if (state.players.some(p => p.toLowerCase() === name.toLowerCase())) {
      showError('Player already added');
      return;
    }
    state.players.push(name);
    playerInput.value = '';
    save();
    render();
  }

  function removePlayer(name) {
    state.players = state.players.filter(p => p !== name);
    save();
    render();
  }

  function clearPlayers() {
    if (state.players.length === 0 && state.rounds.length === 0) return;
    if (!confirm('Clear all players and tournament data?')) return;
    state = defaultState();
    save();
    render();
  }

  playerInput.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });
  addPlayerBtn.addEventListener('click', addPlayer);
  clearPlayersBtn.addEventListener('click', clearPlayers);

  // ---- Shuffle teams ----
  const shuffleBtn = document.getElementById('shuffleBtn');
  const newRoundBtn = document.getElementById('newRoundBtn');

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function makeTeams(players) {
    // Random pairs. If odd, last player gets a bye.
    const shuffled = shuffle(players);
    const teams = [];
    for (let i = 0; i < shuffled.length; i += 2) {
      if (i + 1 < shuffled.length) teams.push([shuffled[i], shuffled[i + 1]]);
      else teams.push([shuffled[i]]); // bye
    }
    return teams;
  }

  function makeMatches(teams) {
    // Pair up teams randomly. Byes are skipped.
    const playable = teams.filter(t => t.length === 2);
    const shuffled = shuffle(playable);
    const matches = [];
    for (let i = 0; i < shuffled.length; i += 2) {
      if (i + 1 < shuffled.length) {
        matches.push({
          id: uid(),
          a: shuffled[i],
          b: shuffled[i + 1],
          games: [{ a: 0, b: 0, finished: false }],
          winner: null,
        });
      } else {
        // odd team out — auto-win bye
        matches.push({
          id: uid(),
          a: shuffled[i],
          b: null,
          games: [],
          winner: 'a',
          bye: true,
        });
      }
    }
    return matches;
  }

  function startNewRound() {
    if (state.players.length < 4) { showError('Need at least 4 players'); return; }
    const teams = makeTeams(state.players);
    const matches = makeMatches(teams);
    state.rounds.push({ number: state.rounds.length + 1, teams, matches });
    save();
    render();
  }

  function startFirstRound() {
    if (state.players.length < 4) { showError('Need at least 4 players'); return; }
    if (state.rounds.length > 0) { showError('Round already exists — use Next Round'); return; }
    startNewRound();
  }

  shuffleBtn.addEventListener('click', startFirstRound);
  newRoundBtn.addEventListener('click', startNewRound);

  // ---- Scoring ----
  function currentMatch(roundIdx, matchId) {
    const round = state.rounds[roundIdx];
    if (!round) return null;
    return round.matches.find(m => m.id === matchId) || null;
  }

  function snapshot() {
    // Snapshot only tournament data — must NOT include `history` itself, or each
    // snapshot grows quadratically and crashes JSON.stringify on a long match.
    return JSON.stringify({ players: state.players, rounds: state.rounds });
  }

  function restoreSnapshot(s) {
    const parsed = JSON.parse(s);
    state.players = parsed.players;
    state.rounds = parsed.rounds;
  }

  function pushHistory() {
    state.history.push(snapshot());
    if (state.history.length > 50) state.history.shift();
  }

  function scorePoint(roundIdx, matchId, side) {
    const match = currentMatch(roundIdx, matchId);
    if (!match || match.winner) return;
    pushHistory();

    let current = match.games[match.games.length - 1];
    if (current.finished) return; // shouldn't happen

    if (side === 'a') current.a++;
    else current.b++;

    // Deuce rule: must win by 2, cap at 30
    const a = current.a, b = current.b;
    const high = Math.max(a, b);
    if ((a >= POINTS_PER_GAME || b >= POINTS_PER_GAME) && high >= POINTS_PER_GAME) {
      if (high >= 30 || Math.abs(a - b) >= 2) {
        current.finished = true;
        current.winner = a > b ? 'a' : 'b';
      }
    }

    // Game 3 side-switch at 11
    // (UI-level concern; we don't track sides per game explicitly, just show note)

    // Check match win
    let aWins = 0, bWins = 0;
    for (const g of match.games) {
      if (g.winner === 'a') aWins++;
      else if (g.winner === 'b') bWins++;
    }
    if (aWins >= GAMES_TO_WIN) match.winner = 'a';
    else if (bWins >= GAMES_TO_WIN) match.winner = 'b';
    else if (aWins + bWins === GAMES_TO_WIN - 1 && (aWins === GAMES_TO_WIN - 1 || bWins === GAMES_TO_WIN - 1)) {
      // one more game needed; ensure third game exists
      if (match.games.length < GAMES_TO_WIN) {
        match.games.push({ a: 0, b: 0, finished: false });
      }
    }

    save();
    render();
  }

  function undoLastPoint() {
    if (state.history.length === 0) { showError('Nothing to undo'); return; }
    const prev = state.history.pop();
    restoreSnapshot(prev);
    save();
    render();
  }

  document.getElementById('undoBtn').addEventListener('click', undoLastPoint);

  // ---- Standings ----
  function computeStandings() {
    const stats = new Map();
    for (const p of state.players) stats.set(p, { name: p, played: 0, wins: 0, losses: 0, pointsFor: 0, pointsAgainst: 0 });
    for (const round of state.rounds) {
      for (const m of round.matches) {
        if (m.bye) {
          // bye counts as a played match with no points
          for (const p of m.a) {
            const s = stats.get(p);
            if (s) s.played++;
          }
          continue;
        }
        for (const side of ['a', 'b']) {
          const team = m[side];
          for (const p of team) {
            const s = stats.get(p);
            if (s) s.played++;
          }
        }
        for (const g of m.games) {
          stats.get(m.a[0]).pointsFor += g.a;
          stats.get(m.a[1]).pointsFor += g.a;
          stats.get(m.b[0]).pointsFor += g.b;
          stats.get(m.b[1]).pointsFor += g.b;
        }
        // Use sets/games won for ranking (BWF convention: match wins primary)
        if (m.winner) {
          const winningTeam = m[m.winner];
          const losingTeam = m[m.winner === 'a' ? 'b' : 'a'];
          for (const p of winningTeam) stats.get(p).wins++;
          for (const p of losingTeam) stats.get(p).losses++;
        }
      }
    }
    return [...stats.values()].sort((a, b) => {
      if (b.wins !== a.wins) return b.wins - a.wins;
      // tiebreaker: point differential
      const aDiff = a.pointsFor - a.pointsAgainst;
      const bDiff = b.pointsFor - b.pointsAgainst;
      return bDiff - aDiff;
    });
  }

  // ---- Export ----
  document.getElementById('exportBtn').addEventListener('click', () => {
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `badminton-tournament-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('Reset the entire tournament? This cannot be undone.')) return;
    state = defaultState();
    save();
    render();
  });

  // ---- Render ----
  function render() {
    renderPlayers();
    renderTeams();
    renderMatches();
    renderStandings();
    shuffleBtn.disabled = state.players.length < 4 || state.rounds.length > 0;
    newRoundBtn.disabled = state.players.length < 4;
    document.getElementById('undoBtn').disabled = state.history.length === 0;
  }

  function renderPlayers() {
    playerList.innerHTML = '';
    if (state.players.length === 0) {
      playerEmpty.style.display = 'block';
    } else {
      playerEmpty.style.display = 'none';
      for (const p of state.players) {
        const pill = document.createElement('span');
        pill.className = 'pill';
        pill.innerHTML = `<span></span><button title="Remove">×</button>`;
        pill.firstChild.textContent = p;
        pill.querySelector('button').addEventListener('click', () => removePlayer(p));
        playerList.appendChild(pill);
      }
    }
  }

  function renderTeams() {
    const area = document.getElementById('teamsArea');
    area.innerHTML = '';
    const last = state.rounds[state.rounds.length - 1];
    if (!last) {
      area.innerHTML = '<div class="empty">No round yet. Click <b>Shuffle Teams</b> to start.</div>';
      return;
    }
    const heading = document.createElement('h3');
    heading.textContent = `Round ${last.number} — ${last.teams.length} teams`;
    area.appendChild(heading);
    const grid = document.createElement('div');
    grid.className = 'teams';
    last.teams.forEach((team, idx) => {
      const div = document.createElement('div');
      div.className = 'team';
      if (team.length === 1) {
        div.innerHTML = `<div class="team-title">Team ${idx + 1}</div><div class="bye">${team[0]} (bye)</div>`;
      } else {
        div.innerHTML = `<div class="team-title">Team ${idx + 1}</div><div>${esc(team[0])} &amp; ${esc(team[1])}</div>`;
      }
      grid.appendChild(div);
    });
    area.appendChild(grid);
  }

  function renderMatches() {
    const area = document.getElementById('matchesArea');
    area.innerHTML = '';
    if (state.rounds.length === 0) {
      area.innerHTML = '<div class="empty">No matches yet.</div>';
      return;
    }
    state.rounds.forEach((round, rIdx) => {
      const heading = document.createElement('h3');
      heading.textContent = `Round ${round.number}`;
      area.appendChild(heading);
      if (round.matches.length === 0) {
        const e = document.createElement('div');
        e.className = 'empty';
        e.textContent = 'No matches.';
        area.appendChild(e);
        return;
      }
      round.matches.forEach(match => {
        const div = document.createElement('div');
        div.className = 'match';

        if (match.bye) {
          div.innerHTML = `<div class="match-header"><span class="label">Match</span><span class="match-status done">BYE</span></div><div style="text-align:center;color:var(--muted)">${esc(match.a[0])} gets a bye this round</div>`;
          area.appendChild(div);
          return;
        }

        let statusHtml = '';
        let statusClass = '';
        if (match.winner) {
          statusClass = 'done';
          statusHtml = `<span class="match-status done">Finished</span>`;
        } else {
          statusClass = 'live';
          statusHtml = `<span class="match-status live">In progress</span>`;
        }

        const aLabel = `${esc(match.a[0])} &amp; ${esc(match.a[1])}`;
        const bLabel = `${esc(match.b[0])} &amp; ${esc(match.b[1])}`;
        const aWins = match.games.filter(g => g.winner === 'a').length;
        const bWins = match.games.filter(g => g.winner === 'b').length;
        const current = match.games[match.games.length - 1];

        const gamesHtml = match.games.map((g, gi) => {
          let label = `G${gi+1}: ${g.a}-${g.b}`;
          if (g.finished) label += g.winner === 'a' ? ' (A)' : ' (B)';
          return `<span class="game-pill">${label}</span>`;
        }).join('');

        let switchNote = '';
        if (match.games.length === 3 && !current.finished) {
          const high = Math.max(current.a, current.b);
          if (high === SIDE_SWITCH) switchNote = `<div style="text-align:center;color:var(--muted);font-size:12px;margin-top:4px">⇄ Side switch at 11</div>`;
        }

        const isDecider = match.games.length === 3 && !match.winner;
        const aSide = match.winner === 'a' ? 'color:var(--accent);font-weight:700' : '';
        const bSide = match.winner === 'b' ? 'color:var(--accent);font-weight:700' : '';

        div.innerHTML = `
          <div class="match-header"><span class="label">Match</span>${statusHtml}</div>
          <div class="sides">
            <div class="side left">
              <div class="side-name" style="${aSide}">${aLabel}</div>
              <div class="side-players">${aWins} game${aWins!==1?'s':''} won</div>
              <div class="score">${current.a}</div>
              <div class="score-controls">
                <button data-side="a" data-act="plus" ${match.winner?'disabled':''}>+1</button>
                <button class="secondary" data-side="a" data-act="minus" ${match.winner?'disabled':''}>-1</button>
              </div>
            </div>
            <div style="text-align:center;color:var(--muted);font-size:12px">vs</div>
            <div class="side">
              <div class="side-name" style="${bSide}">${bLabel}</div>
              <div class="side-players">${bWins} game${bWins!==1?'s':''} won</div>
              <div class="score">${current.b}</div>
              <div class="score-controls">
                <button data-side="b" data-act="plus" ${match.winner?'disabled':''}>+1</button>
                <button class="secondary" data-side="b" data-act="minus" ${match.winner?'disabled':''}>-1</button>
              </div>
            </div>
          </div>
          <div class="games">${gamesHtml}</div>
          ${switchNote}
        `;

        div.querySelectorAll('button[data-side]').forEach(btn => {
          btn.addEventListener('click', () => {
            const side = btn.dataset.side;
            const act = btn.dataset.act;
            if (act === 'plus') scorePoint(rIdx, match.id, side);
            else {
              // manual decrement: push history then mutate
              pushHistory();
              const cur = match.games[match.games.length - 1];
              if (cur.finished) {
                // roll back last finished game
                if (cur.winner) {
                  if (cur.winner === 'a') match.winner = null;
                }
                cur.finished = false;
                cur.winner = null;
                match.winner = null;
                if (side === 'a' && cur.a > 0) cur.a--;
                else if (side === 'b' && cur.b > 0) cur.b--;
              } else {
                if (side === 'a' && cur.a > 0) cur.a--;
                else if (side === 'b' && cur.b > 0) cur.b--;
              }
              // remove trailing empty game 3 if it's still 0-0
              if (match.games.length > 1) {
                const lastG = match.games[match.games.length - 1];
                const prevG = match.games[match.games.length - 2];
                if (!lastG.finished && lastG.a === 0 && lastG.b === 0 && prevG.finished) {
                  match.games.pop();
                }
              }
              save();
              render();
            }
          });
        });

        area.appendChild(div);
      });
    });
  }

  function renderStandings() {
    const area = document.getElementById('standingsArea');
    area.innerHTML = '';
    if (state.players.length === 0) {
      area.innerHTML = '<div class="empty">Standings will appear once players are added.</div>';
      return;
    }
    const standings = computeStandings();
    const table = document.createElement('table');
    table.className = 'standings';
    table.innerHTML = `
      <thead><tr>
        <th>#</th><th>Player</th><th>P</th><th>W</th><th>L</th><th>PF</th><th>PA</th><th>Diff</th>
      </tr></thead>
      <tbody></tbody>
    `;
    const tbody = table.querySelector('tbody');
    standings.forEach((s, i) => {
      const tr = document.createElement('tr');
      if (i === 0 && s.wins > 0) tr.classList.add('winner');
      const diff = s.pointsFor - s.pointsAgainst;
      tr.innerHTML = `
        <td>${i+1}</td>
        <td>${esc(s.name)}</td>
        <td>${s.played}</td>
        <td>${s.wins}</td>
        <td>${s.losses}</td>
        <td>${s.pointsFor}</td>
        <td>${s.pointsAgainst}</td>
        <td>${diff > 0 ? '+' : ''}${diff}</td>
      `;
      tbody.appendChild(tr);
    });
    area.appendChild(table);
  }

  // initial render
  render();
})();
</script>
</body>
</html>
