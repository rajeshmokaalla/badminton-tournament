<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Badminton" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%230f172a'/><text x='50%25' y='54%25' font-size='140' text-anchor='middle' dominant-baseline='middle'>🏸</text></svg>" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='52' font-size='56'>🏸</text></svg>" />
<title>Badminton Tournament</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #22c55e;
    --accent-2: #16a34a;
    --warn: #ef4444;
    --shadow: 0 10px 30px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }
  h1 { margin: 0 0 6px; font-size: 28px; }
  h2 { margin: 24px 0 12px; font-size: 20px; }
  h3 { margin: 0 0 8px; font-size: 16px; color: var(--muted); font-weight: 500; }
  .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
  .panel { background: var(--panel); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  input[type="text"] { background: var(--panel-2); border: 1px solid #475569; color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 14px; flex: 1; min-width: 160px; }
  input[type="text"]:focus { outline: 2px solid var(--accent); border-color: transparent; }
  button { background: var(--accent); color: #052e16; border: 0; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
  button:hover { background: var(--accent-2); }
  button.secondary { background: var(--panel-2); color: var(--text); }
  button.secondary:hover { background: #475569; }
  button.danger { background: var(--warn); color: #fff; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .player-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .pill { background: var(--panel-2); padding: 6px 12px; border-radius: 999px; font-size: 13px; display: inline-flex; gap: 6px; align-items: center; }
  .pill button { background: transparent; color: var(--muted); padding: 0 0 0 4px; font-size: 16px; line-height: 1; }
  .pill button:hover { color: var(--warn); background: transparent; }
  .teams { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-top: 12px; }
  .team { background: var(--panel-2); border-radius: 10px; padding: 16px; }
  .team-title { font-weight: 600; margin-bottom: 6px; font-size: 15px; color: var(--accent); }
  .bye { color: var(--muted); font-style: italic; }
  .match { background: var(--panel-2); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .match-header .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .match-status { font-size: 12px; padding: 4px 8px; border-radius: 6px; background: #475569; }
  .match-status.live { background: #facc15; color: #422006; }
  .match-status.done { background: var(--accent); color: #052e16; }
  .sides { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
  .side { text-align: center; }
  .side.left { text-align: right; }
  .side-name { font-weight: 600; margin-bottom: 4px; min-height: 20px; }
  .side-players { color: var(--muted); font-size: 12px; min-height: 18px; }
  .score { font-size: 36px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 50px; text-align: center; }
  .score-controls { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
  .score-controls button { padding: 6px 12px; font-size: 13px; }
  .games { display: flex; gap: 8px; justify-content: center; margin-top: 8px; font-size: 12px; color: var(--muted); }
  .game-pill { background: #0f172a; padding: 2px 6px; border-radius: 4px; }
  .empty { color: var(--muted); font-style: italic; padding: 12px 0; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .standings { width: 100%; border-collapse: collapse; font-size: 14px; }
  .standings th, .standings td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--panel-2); }
  .standings th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
  .standings tr.winner td { color: var(--accent); font-weight: 600; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--warn); color: #fff; padding: 10px 16px; border-radius: 8px; box-shadow: var(--shadow); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .footer-note { color: var(--muted); font-size: 12px; text-align: center; margin-top: 24px; }
  .winner-banner { background: linear-gradient(135deg, #22c55e, #16a34a); color: #052e16; padding: 14px 18px; border-radius: 10px; font-size: 16px; font-weight: 600; margin-bottom: 14px; text-align: center; box-shadow: var(--shadow); }
  .winner-banner b { font-weight: 800; }
  .section-title-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  @media (max-width: 600px) {
    h1 { font-size: 22px; }
    .container { padding: 16px 12px 80px; }
    .panel { padding: 14px; border-radius: 10px; }
    button { padding: 12px 14px; font-size: 15px; }
    input[type="text"] { font-size: 16px; padding: 12px; }
    .teams { grid-template-columns: 1fr; }
    .sides { grid-template-columns: 1fr; gap: 8px; }
    .side.left { text-align: center; }
    .score { font-size: 40px; }
    .score-controls button { padding: 10px 18px; font-size: 16px; }
    .standings th, .standings td { padding: 6px 6px; font-size: 13px; }
    .section-title-row .actions { width: 100%; }
    .section-title-row .actions button { flex: 1; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  }
  .header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .header-row .header-text { flex: 1; min-width: 0; }
  .header-row h1 { margin: 0 0 6px; }
  .header-row .subtitle { margin: 0; }
  .header-row .install-btn { white-space: nowrap; margin-top: 6px; }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <div class="header-text">
      <h1>🏸 Badminton Tournament</h1>
      <div class="subtitle">Doubles round-robin · BWF scoring (single game to 21)</div>
    </div>
    <button id="installBtn" class="secondary install-btn" type="button">📲 Install app</button>
  </div>

  <div class="panel">
    <h2>1. Players</h2>
    <div class="row">
      <input type="text" id="playerInput" placeholder="Enter player name and press Enter or Add" />
      <button id="addPlayerBtn">Add</button>
      <button class="secondary" id="clearPlayersBtn">Clear All</button>
    </div>
    <div class="player-list" id="playerList"></div>
    <div class="empty" id="playerEmpty">No players added yet. Add an even number of players (6, 8, 10, 12 …) to start.</div>
  </div>

  <div class="panel">
    <div class="section-title-row">
      <h2>2. Round</h2>
      <div class="actions">
        <button id="shuffleBtn" disabled>🎲 Shuffle Teams</button>
        <button class="secondary" id="newRoundBtn" disabled>Next Phase</button>
      </div>
    </div>
    <div id="teamsArea"></div>
  </div>

  <div class="panel">
    <h2>3. Matches</h2>
    <div id="matchesArea"></div>
  </div>

  <div class="panel">
    <div class="section-title-row">
      <h2>4. Standings</h2>
      <div class="actions">
        <button class="secondary" id="undoBtn" disabled>↶ Undo Last Point</button>
        <button class="secondary" id="exportBtn">Export</button>
        <button class="danger" id="resetBtn">Reset Tournament</button>
      </div>
    </div>
    <div id="standingsArea"></div>
  </div>

  <div class="footer-note">Saved automatically in your browser.</div>
</div>
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'badminton-tournament-v2';
  const GAMES_TO_WIN = 1; // single game per match
  const POINTS_PER_GAME = 21;
  const SIDE_SWITCH = 11; // game 3 only

  const defaultState = () => ({
    players: [],
    rounds: [],   // each: { number, teams: [[p1,p2], ...], matches: [{id, a:[p1,p2], b:[p1,p2], games:[{a,b,winner}], winner:null}] }
    history: [],  // for undo
    tournamentTeams: [], // fixed teams for the tournament (shuffled once)
    finalTopTeam: null, // legacy (kept for old saves)
    knockoutByeTeams: [], // teams that have a bye in current knockout round
  });

  let state = load();

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      const parsed = JSON.parse(raw);
      return { ...defaultState(), ...parsed };
    } catch (e) { return defaultState(); }
  }

  function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {} }

  function uid() { return Math.random().toString(36).slice(2, 10); }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function showError(msg) { toast(msg); }

  function esc(s) { return String(s).replace(/[&<>\"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  window.addEventListener('error', e => { toast('Something went wrong: ' + (e.message || 'unknown error')); });

  // ---- Players ----
  const playerInput = document.getElementById('playerInput');
  const addPlayerBtn = document.getElementById('addPlayerBtn');
  const clearPlayersBtn = document.getElementById('clearPlayersBtn');
  const playerList = document.getElementById('playerList');
  const playerEmpty = document.getElementById('playerEmpty');

  function addPlayer() {
    const name = playerInput.value.trim();
    if (!name) return;
    if (state.players.some(p => p.toLowerCase() === name.toLowerCase())) { showError('Player already added'); return; }
    state.players.push(name);
    playerInput.value = '';
    save();
    render();
  }

  function removePlayer(name) {
    state.players = state.players.filter(p => p !== name);
    save();
    render();
  }

  function clearPlayers() {
    if (state.players.length === 0 && state.rounds.length === 0) return;
    if (!confirm('Clear all players and tournament data?')) return;
    state = defaultState();
    save();
    render();
  }

  playerInput.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });
  addPlayerBtn.addEventListener('click', addPlayer);
  clearPlayersBtn.addEventListener('click', clearPlayers);

  // ---- Shuffle (create fixed teams) ----
  const shuffleBtn = document.getElementById('shuffleBtn');
  const newRoundBtn = document.getElementById('newRoundBtn');

  function shuffle(arr) { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }

  function makeTeams(players) {
    const teams = [];
    for (let i = 0; i < players.length; i += 2) {
      if (i + 1 < players.length) teams.push([players[i], players[i + 1]]);
      else teams.push([players[i]]); // fallback if odd number
    }
    return teams;
  }

  // Generate matches where each team plays up to two games against distinct opponents
  function generateGroupMatches(teams) {
    const n = teams.length;
    const matchCounts = new Array(n).fill(0);
    const matches = [];
    const possiblePairs = [];
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) possiblePairs.push([i, j]);
    }
    // shuffle possible pairs
    const shuffledPairs = shuffle(possiblePairs);
    for (const [i, j] of shuffledPairs) {
      if (matchCounts[i] < 2 && matchCounts[j] < 2) {
        matches.push({ a: teams[i], b: teams[j] });
        matchCounts[i]++; matchCounts[j]++;
        if (matchCounts.every(c => c === 2)) break;
      }
    }
    // If we have exactly two teams and they have less than 2 matches, schedule duplicate matches to reach 2 each
    if (n === 2) {
      while (matchCounts[0] < 2) {
        matches.push({ a: teams[0], b: teams[1] });
        matchCounts[0]++; matchCounts[1]++;
      }
    }
    // Convert to match objects used by the app
    return matches.map(pair => ({
      id: uid(),
      a: pair.a,
      b: pair.b,
      games: [{ a: 0, b: 0, finished: false }],
      winner: null,
    }));
  }

  function startGroupStage() {
    // Require an even number of players, at least 6
    if (state.players.length < 6 || state.players.length % 2 !== 0) {
      showError('Need an even number of players (6, 8, 10, 12 …)');
      return;
    }
    if (state.rounds.length > 0) { showError('Tournament already started'); return; }
    // Shuffle players, then pair sequentially into 2-player teams
    const shuffled = shuffle(state.players);
    const teams = makeTeams(shuffled);
    state.tournamentTeams = teams;
    const scheduleRounds = buildSchedule(teams);
    scheduleRounds.forEach((pairs, idx) => {
      const matches = pairs.map(pair => ({
        id: uid(),
        a: teams[pair[0]],
        b: teams[pair[1]],
        games: [{ a: 0, b: 0, finished: false }],
        winner: null,
      }));
      state.rounds.push({ number: idx + 1, teams, matches, phase: 'group' });
    });
    save();
    render();
  }

  // Build a round-robin schedule using the circle/polygon method.
  // Works for any number of teams n ≥ 2.
  // Returns an array of rounds; each round is an array of [teamA, teamB] index pairs.
  function buildSchedule(teams) {
    const n = teams.length;
    if (n < 2) return [];

    if (n === 3) {
      // 3-team: each pair plays twice (double round robin) so each team gets 2 games
      return [
        [[0, 1], [1, 2], [2, 0]],
        [[1, 0], [2, 1], [0, 2]],
      ];
    }

    // Circle method for even n:
    // Fix team 0; rotate teams 1..n-1 each round.
    // For odd n, add a virtual "bye" team to make it even, then remove those matches.
    const useN = n % 2 === 0 ? n : n + 1;
    const rounds = [];
    const circle = [];
    for (let i = 1; i < useN; i++) circle.push(i); // teams 1..useN-1

    for (let r = 0; r < useN - 1; r++) {
      const round = [];
      // Fixed team 0 vs the team at the end of the circle
      const opp = circle[circle.length - 1];
      if (opp < n) round.push([0, opp]); // skip if opp is the virtual bye
      // Pair up the rest of the circle
      for (let i = 0; i < Math.floor((useN - 2) / 2); i++) {
        const a = circle[i];
        const b = circle[useN - 2 - i];
        if (a < n && b < n) round.push([a, b]);
      }
      rounds.push(round);
      // Rotate circle by 1
      circle.unshift(circle.pop());
    }
    return rounds;
  }

  // Helper to check if all matches in a round have a winner (or are byes)
  function allMatchesFinished(round) { return round.matches.every(m => m.winner); }

  // ---- Knockout phases ----
  function computeTeamStandings() {
    const teams = state.tournamentTeams || [];
    const teamStats = teams.map(team => {
      const key = team.slice().sort().join('|');
      return { team, key, wins: 0, losses: 0, pointsFor: 0, pointsAgainst: 0 };
    });
    const teamByKey = new Map(teamStats.map(t => [t.key, t]));
    function findTeam(team) {
      return teamByKey.get(team.slice().sort().join('|'));
    }
    for (const round of state.rounds) {
      for (const m of round.matches) {
        if (m.bye) continue;
        for (const g of m.games) {
          findTeam(m.a).pointsFor += g.a;
          findTeam(m.b).pointsFor += g.b;
          findTeam(m.a).pointsAgainst += g.b;
          findTeam(m.b).pointsAgainst += g.a;
        }
        if (m.winner) {
          findTeam(m[m.winner]).wins++;
          findTeam(m[m.winner === 'a' ? 'b' : 'a']).losses++;
        }
      }
    }
    teamStats.forEach(s => {
      s.played = s.wins + s.losses;
      s.diff = s.pointsFor - s.pointsAgainst;
    });
    teamStats.sort((a, b) => {
      if (b.wins !== a.wins) return b.wins - a.wins;
      return b.diff - a.diff;
    });
    return teamStats;
  }

  // Return the largest power-of-2 ≤ n (e.g. 5→4, 6→4, 8→8)
  function knockoutBracketSize(n) {
    let size = 1;
    while (size * 2 <= n) size *= 2;
    return size;
  }

  // Generate a single knockout round from a list of teams (ordered best-to-worst).
  // Seeds them so #1 plays #last, #2 plays #second-last, etc.
  // If there are more teams than bracket slots, top teams get byes.
  function generateKnockoutRound(teamStats, phase) {
    const n = teamStats.length;
    const bracket = knockoutBracketSize(n);
    const byes = bracket - n; // top `byes` teams skip straight to the next round
    // The teams that actually play this round
    const playing = teamStats.slice(byes); // worst (n - bracket/2 * 2)? Actually:
    // We want bracket/2 matches from the bottom seeds, byes go to top seeds.
    // playing teams: those not getting a bye
    const playingTeams = teamStats.slice(byes).map(s => s.team);
    const matches = [];
    for (let i = 0; i < Math.floor(playingTeams.length / 2); i++) {
      matches.push({
        id: uid(),
        a: playingTeams[i],
        b: playingTeams[playingTeams.length - 1 - i],
        games: [{ a: 0, b: 0, finished: false }],
        winner: null,
      });
    }
    // Store bye teams so next round can use them
    state.knockoutByeTeams = teamStats.slice(0, byes).map(s => s.team);
    state.rounds.push({ number: state.rounds.length + 1, teams: [], matches, phase });
    save();
    render();
  }

  // Advance knockout: collect winners from last round + stored bye teams → next round or final
  function advanceKnockout() {
    const lastRound = state.rounds[state.rounds.length - 1];
    const winners = lastRound.matches.map(m => m[m.winner]);
    const byeTeams = state.knockoutByeTeams || [];
    const allTeams = [...byeTeams, ...winners]; // best seeds first (byes are top seeds)
    state.knockoutByeTeams = [];

    if (allTeams.length === 2) {
      // Final
      state.rounds.push({
        number: state.rounds.length + 1,
        teams: [],
        matches: [{
          id: uid(), a: allTeams[0], b: allTeams[1],
          games: [{ a: 0, b: 0, finished: false }], winner: null,
        }],
        phase: 'final',
      });
    } else {
      // Another knockout round
      const matches = [];
      for (let i = 0; i < Math.floor(allTeams.length / 2); i++) {
        matches.push({
          id: uid(),
          a: allTeams[i],
          b: allTeams[allTeams.length - 1 - i],
          games: [{ a: 0, b: 0, finished: false }],
          winner: null,
        });
      }
      // Determine phase label
      const remaining = allTeams.length;
      const phase = remaining === 4 ? 'semi' : 'knockout';
      state.rounds.push({ number: state.rounds.length + 1, teams: [], matches, phase });
    }
    save();
    render();
  }

  function nextPhase() {
    if (state.rounds.length === 0) { showError('Shuffle teams first'); return; }
    const currentRound = state.rounds[state.rounds.length - 1];
    if (!allMatchesFinished(currentRound)) {
      showError('Finish all matches of the current phase first');
      return;
    }

    // If current round is a finished final → tournament over
    if (currentRound.phase === 'final') {
      toast('Tournament completed');
      return;
    }

    // If we're already in a knockout/semi phase → advance to next knockout round
    if (currentRound.phase === 'knockout' || currentRound.phase === 'semi') {
      advanceKnockout();
      return;
    }

    // Group stage just finished → start knockout
    const teamStats = computeTeamStandings();
    const teamCount = teamStats.length;

    if (teamCount < 2) { showError('Not enough teams'); return; }

    if (teamCount === 2) {
      // Straight to final
      state.knockoutByeTeams = [];
      state.rounds.push({
        number: state.rounds.length + 1, teams: [], phase: 'final',
        matches: [{
          id: uid(), a: teamStats[0].team, b: teamStats[1].team,
          games: [{ a: 0, b: 0, finished: false }], winner: null,
        }],
      });
      save(); render(); return;
    }

    if (teamCount === 3) {
      // Top team gets a bye, 2nd vs 3rd in semi
      state.knockoutByeTeams = [teamStats[0].team];
      state.rounds.push({
        number: state.rounds.length + 1, teams: [], phase: 'semi',
        matches: [{
          id: uid(), a: teamStats[1].team, b: teamStats[2].team,
          games: [{ a: 0, b: 0, finished: false }], winner: null,
        }],
      });
      save(); render(); return;
    }

    // 4+ teams: use bracket-based knockout
    const bracket = knockoutBracketSize(teamCount);
    const byes = bracket - teamCount;

    if (teamCount === bracket) {
      // Perfect bracket (4, 8, 16 teams…) — all play in pairs, no byes
      // Seed: 1v(n), 2v(n-1), etc. but in rounds: split into halves
      // For 4 teams: 1v4, 2v3 (semifinal), then final
      // For 8 teams: QF round with 4 matches, then SF, then F
      const phase = teamCount === 4 ? 'semi' : 'knockout';
      state.knockoutByeTeams = [];
      const matches = [];
      for (let i = 0; i < teamCount / 2; i++) {
        matches.push({
          id: uid(),
          a: teamStats[i].team,
          b: teamStats[teamCount - 1 - i].team,
          games: [{ a: 0, b: 0, finished: false }],
          winner: null,
        });
      }
      state.rounds.push({ number: state.rounds.length + 1, teams: [], matches, phase });
      save(); render();
    } else {
      // Imperfect bracket (5,6,7 teams etc.) — top `byes` teams sit out round 1
      state.knockoutByeTeams = teamStats.slice(0, byes).map(s => s.team);
      const playingTeams = teamStats.slice(byes);
      const matches = [];
      for (let i = 0; i < playingTeams.length / 2; i++) {
        matches.push({
          id: uid(),
          a: playingTeams[i].team,
          b: playingTeams[playingTeams.length - 1 - i].team,
          games: [{ a: 0, b: 0, finished: false }],
          winner: null,
        });
      }
      const phase = (byes + matches.length) === 2 ? 'semi' : 'knockout';
      state.rounds.push({ number: state.rounds.length + 1, teams: [], matches, phase });
      save(); render();
    }
  }

  shuffleBtn.addEventListener('click', startGroupStage);
  newRoundBtn.addEventListener('click', nextPhase);

  // ---- Scoring ----
  function currentMatch(roundIdx, matchId) {
    const round = state.rounds[roundIdx];
    if (!round) return null;
    return round.matches.find(m => m.id === matchId) || null;
  }

  function snapshot() { return JSON.stringify({ players: state.players, rounds: state.rounds }); }
  function restoreSnapshot(s) { const parsed = JSON.parse(s); state.players = parsed.players; state.rounds = parsed.rounds; }
  function pushHistory() { state.history.push(snapshot()); if (state.history.length > 50) state.history.shift(); }

  function scorePoint(roundIdx, matchId, side) {
    const match = currentMatch(roundIdx, matchId);
    if (!match || match.winner) return;
    pushHistory();
    let current = match.games[match.games.length - 1];
    if (current.finished) return;
    if (side === 'a') current.a++; else current.b++;
    const a = current.a, b = current.b;
    const high = Math.max(a, b);
    if ((a >= POINTS_PER_GAME || b >= POINTS_PER_GAME) && high >= POINTS_PER_GAME) {
      if (high >= 30 || Math.abs(a - b) >= 2) {
        current.finished = true;
        current.winner = a > b ? 'a' : 'b';
      }
    }
    // Check match win
    let aWins = 0, bWins = 0;
    for (const g of match.games) {
      if (g.winner === 'a') aWins++;
      else if (g.winner === 'b') bWins++;
    }
    if (aWins >= GAMES_TO_WIN) match.winner = 'a';
    else if (bWins >= GAMES_TO_WIN) match.winner = 'b';
    else if (aWins + bWins === GAMES_TO_WIN - 1 && (aWins === GAMES_TO_WIN - 1 || bWins === GAMES_TO_WIN - 1)) {
      if (match.games.length < GAMES_TO_WIN) match.games.push({ a: 0, b: 0, finished: false });
    }
    save();
    render();
  }

  function undoLastPoint() {
    if (state.history.length === 0) { showError('Nothing to undo'); return; }
    const prev = state.history.pop();
    restoreSnapshot(prev);
    save();
    render();
  }

  document.getElementById('undoBtn').addEventListener('click', undoLastPoint);

  // ---- Standings ----
  function computeStandings() {
    const stats = new Map();
    for (const p of state.players) stats.set(p, { name: p, played: 0, wins: 0, losses: 0, pointsFor: 0, pointsAgainst: 0 });
    for (const round of state.rounds) {
      for (const m of round.matches) {
        if (m.bye) {
          for (const p of m.a) { const s = stats.get(p); if (s) s.played++; }
          continue;
        }
        // count games points
        for (const g of m.games) {
          for (const p of m.a) { const s = stats.get(p); if (s) { s.pointsFor += g.a; s.pointsAgainst += g.b; } }
          for (const p of m.b) { const s = stats.get(p); if (s) { s.pointsFor += g.b; s.pointsAgainst += g.a; } }
        }
        // win/loss per player
        if (m.winner) {
          const winningTeam = m[m.winner];
          const losingTeam = m[m.winner === 'a' ? 'b' : 'a'];
          for (const p of winningTeam) { const s = stats.get(p); if (s) s.wins++; }
          for (const p of losingTeam) { const s = stats.get(p); if (s) s.losses++; }
        }
        // played count per player
        for (const side of ['a', 'b']) {
          const team = m[side];
          if (!team) continue;
          for (const p of team) { const s = stats.get(p); if (s) s.played++; }
        }
      }
    }
    return [...stats.values()].sort((a, b) => {
      if (b.wins !== a.wins) return b.wins - a.wins;
      const aDiff = a.pointsFor - a.pointsAgainst;
      const bDiff = b.pointsFor - b.pointsAgainst;
      return bDiff - aDiff;
    });
  }

  // ---- Export ----
  document.getElementById('exportBtn').addEventListener('click', () => {
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `badminton-tournament-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  });

  // ---- Reset ----
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('Reset the entire tournament? This cannot be undone')) return;
    state = defaultState();
    save();
    render();
  });

  // ---- Render ----
  function render() {
    renderPlayers();
    renderTeams();
    renderMatches();
    renderStandings();
    const playerCountOk = state.players.length >= 6 && state.players.length % 2 === 0;
    shuffleBtn.disabled = !playerCountOk || state.rounds.length > 0;
    const lastRound = state.rounds[state.rounds.length - 1];
    const tournamentOver = lastRound
      && lastRound.phase === 'final'
      && lastRound.matches[0] && lastRound.matches[0].winner;
    newRoundBtn.disabled = !lastRound || !allMatchesFinished(lastRound) || tournamentOver;
    document.getElementById('undoBtn').disabled = state.history.length === 0;
  }

  function renderPlayers() {
    playerList.innerHTML = '';
    if (state.players.length === 0) { playerEmpty.style.display = 'block'; }
    else { playerEmpty.style.display = 'none';
      for (const p of state.players) {
        const pill = document.createElement('span');
        pill.className = 'pill';
        pill.innerHTML = `<span></span><button title="Remove">×</button>`;
        pill.firstChild.textContent = p;
        pill.querySelector('button').addEventListener('click', () => removePlayer(p));
        playerList.appendChild(pill);
      }
    }
  }

  function renderTeams() {
    const area = document.getElementById('teamsArea');
    area.innerHTML = '';
    const last = state.rounds[state.rounds.length - 1];
    if (!last) { area.innerHTML = '<div class="empty">No round yet. Click <b>Shuffle Teams</b> to start.</div>'; return; }
    const heading = document.createElement('h3');
    if (last.phase === 'semi' || last.phase === 'final' || last.phase === 'knockout') {
      heading.textContent = phaseLabel(last);
      area.appendChild(heading);
      area.appendChild(Object.assign(document.createElement('div'), { className: 'empty', textContent: 'Teams are shown in the match below.' }));
      return;
    }
    heading.textContent = `${phaseLabel(last)} — ${last.teams.length} teams`;
    area.appendChild(heading);
    const grid = document.createElement('div');
    grid.className = 'teams';
    last.teams.forEach((team, idx) => {
      const div = document.createElement('div');
      div.className = 'team';
      if (team.length === 1) {
        div.innerHTML = `<div class="team-title">Team ${idx + 1}</div><div class="bye">${team[0]} (bye)</div>`;
      } else {
        div.innerHTML = `<div class="team-title">Team ${idx + 1}</div><div>${esc(team[0])} &amp; ${esc(team[1])}</div>`;
      }
      grid.appendChild(div);
    });
    area.appendChild(grid);
  }

  function phaseLabel(round) {
    if (round.phase === 'semi') return 'Semifinal';
    if (round.phase === 'final') return 'Final';
    if (round.phase === 'knockout') {
      const matchCount = round.matches.length;
      if (matchCount === 4) return 'Quarterfinal';
      return 'Knockout Round';
    }
    return `Round ${round.number}`;
  }

  function renderMatches() {
    const area = document.getElementById('matchesArea');
    area.innerHTML = '';
    if (state.rounds.length === 0) { area.innerHTML = '<div class="empty">No matches yet.</div>'; return; }
    // Find the final round (if any) so we can show a congrats banner after it finishes
    const finalRound = [...state.rounds].reverse().find(r => r.phase === 'final');
    state.rounds.forEach((round, rIdx) => {
      const heading = document.createElement('h3');
      heading.textContent = phaseLabel(round);
      area.appendChild(heading);
      if (round.matches.length === 0) { const e = document.createElement('div'); e.className = 'empty'; e.textContent = 'No matches.'; area.appendChild(e); return; }
      if (round === finalRound && round.matches[0].winner) {
        const winnerTeam = round.matches[0][round.matches[0].winner];
        const banner = document.createElement('div');
        banner.className = 'winner-banner';
        banner.innerHTML = `🏆 Congratulations to <b>${esc(winnerTeam[0])} &amp; ${esc(winnerTeam[1])}</b> — tournament champions!`;
        area.appendChild(banner);
      }
      round.matches.forEach(match => {
        const div = document.createElement('div');
        div.className = 'match';
        if (match.bye) {
          div.innerHTML = `<div class="match-header"><span class="label">Match</span><span class="match-status done">BYE</span></div><div style="text-align:center;color:var(--muted)">${esc(match.a[0])} gets a bye this round</div>`;
          area.appendChild(div);
          return;
        }
        let statusHtml = '';
        let statusClass = '';
        if (match.winner) { statusClass = 'done'; statusHtml = `<span class="match-status done">Finished</span>`; }
        else { statusClass = 'live'; statusHtml = `<span class="match-status live">In progress</span>`; }
        const aLabel = `${esc(match.a[0])} &amp; ${esc(match.a[1])}`;
        const bLabel = `${esc(match.b[0])} &amp; ${esc(match.b[1])}`;
        const aWins = match.games.filter(g => g.winner === 'a').length;
        const bWins = match.games.filter(g => g.winner === 'b').length;
        const current = match.games[match.games.length - 1];
        const gamesHtml = match.games.map((g, gi) => {
          let label = `G${gi+1}: ${g.a}-${g.b}`;
          if (g.finished) label += g.winner === 'a' ? ' (A)' : ' (B)';
          return `<span class="game-pill">${label}</span>`;
        }).join('');
        let switchNote = '';
        if (match.games.length === 3 && !current.finished) {
          const high = Math.max(current.a, current.b);
          if (high === SIDE_SWITCH) switchNote = `<div style="text-align:center;color:var(--muted);font-size:12px;margin-top:4px">⇄ Side switch at 11</div>`;
        }
        const aSideStyle = match.winner === 'a' ? 'color:var(--accent);font-weight:700' : '';
        const bSideStyle = match.winner === 'b' ? 'color:var(--accent);font-weight:700' : '';
        const showGamesInfo = GAMES_TO_WIN > 1;
        div.innerHTML = `
          <div class="match-header"><span class="label">Match</span>${statusHtml}</div>
          <div class="sides">
            <div class="side left">
              <div class="side-name" style="${aSideStyle}">${aLabel}</div>
              ${showGamesInfo ? `<div class="side-players">${aWins} game${aWins!==1?'s':''} won</div>` : ''}
              <div class="score">${current.a}</div>
              <div class="score-controls">
                <button data-side="a" data-act="plus" ${match.winner?'disabled':''}>+1</button>
                <button class="secondary" data-side="a" data-act="minus" ${match.winner?'disabled':''}>-1</button>
              </div>
            </div>
            <div style="text-align:center;color:var(--muted);font-size:12px">vs</div>
            <div class="side">
              <div class="side-name" style="${bSideStyle}">${bLabel}</div>
              ${showGamesInfo ? `<div class="side-players">${bWins} game${bWins!==1?'s':''} won</div>` : ''}
              <div class="score">${current.b}</div>
              <div class="score-controls">
                <button data-side="b" data-act="plus" ${match.winner?'disabled':''}>+1</button>
                <button class="secondary" data-side="b" data-act="minus" ${match.winner?'disabled':''}>-1</button>
              </div>
            </div>
          </div>
          ${showGamesInfo ? `<div class="games">${gamesHtml}</div>` : ''}
          ${switchNote}
        `;
        // attach button listeners
        div.querySelectorAll('button[data-side]').forEach(btn => {
          btn.addEventListener('click', () => {
            const side = btn.dataset.side;
            const act = btn.dataset.act;
            if (act === 'plus') scorePoint(rIdx, match.id, side);
            else {
              // manual decrement
              pushHistory();
              const cur = match.games[match.games.length - 1];
              if (cur.finished) {
                if (cur.winner) {
                  if (cur.winner === 'a') match.winner = null;
                }
                cur.finished = false;
                cur.winner = null;
                match.winner = null;
                if (side === 'a' && cur.a > 0) cur.a--;
                else if (side === 'b' && cur.b > 0) cur.b--;
              } else {
                if (side === 'a' && cur.a > 0) cur.a--;
                else if (side === 'b' && cur.b > 0) cur.b--;
              }
              // prune empty third game if needed
              if (match.games.length > 1) {
                const lastG = match.games[match.games.length - 1];
                const prevG = match.games[match.games.length - 2];
                if (!lastG.finished && lastG.a === 0 && lastG.b === 0 && prevG.finished) match.games.pop();
              }
              save();
              render();
            }
          });
        });
        area.appendChild(div);
      });
    });
  }

  function renderStandings() {
    const area = document.getElementById('standingsArea');
    area.innerHTML = '';
    if (state.players.length === 0) { area.innerHTML = '<div class="empty">Standings will appear once players are added.</div>'; return; }
    if ((state.tournamentTeams || []).length === 0) {
      area.innerHTML = '<div class="empty">Standings will appear once the tournament starts.</div>';
      return;
    }
    const standings = computeTeamStandings();
    const table = document.createElement('table');
    table.className = 'standings';
    table.innerHTML = `
      <thead><tr>
        <th>#</th><th>Team</th><th>P</th><th>W</th><th>L</th><th>PF</th><th>PA</th><th>Diff</th>
      </tr></thead>
      <tbody></tbody>
    `;
    const tbody = table.querySelector('tbody');
    standings.forEach((s, i) => {
      const tr = document.createElement('tr');
      if (i === 0 && s.wins > 0) tr.classList.add('winner');
      const teamLabel = s.team.length === 1
        ? `${esc(s.team[0])} <span class="bye">(bye)</span>`
        : `${esc(s.team[0])} &amp; ${esc(s.team[1])}`;
      const played = s.played != null ? s.played : (s.wins + s.losses);
      const diff = s.pointsFor - s.pointsAgainst;
      tr.innerHTML = `
        <td>${i+1}</td>
        <td>${teamLabel}</td>
        <td>${played}</td>
        <td>${s.wins}</td>
        <td>${s.losses}</td>
        <td>${s.pointsFor}</td>
        <td>${s.pointsAgainst}</td>
        <td>${diff > 0 ? '+' : ''}${diff}</td>
      `;
      tbody.appendChild(tr);
    });
    area.appendChild(table);
  }

  // initial render
  render();

  // ---- PWA: install button + service worker ----
  let deferredPrompt = null;
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

  const installBtn = document.getElementById('installBtn');
  function refreshInstallBtn() {
    if (!installBtn) return;
    if (isStandalone) { installBtn.style.display = 'none'; return; }
    installBtn.style.display = '';
  }
  if (installBtn) {
    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        try { await deferredPrompt.userChoice; } catch (e) {}
        deferredPrompt = null;
        return;
      }
      // No native install prompt available — show manual instructions
      if (isIOS) {
        showError('Tap the Share button, then "Add to Home Screen"');
      } else {
        showError('Use the browser menu → "Add to Home screen" or "Install app"');
      }
    });
    refreshInstallBtn();
  }

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
  });

  window.addEventListener('appinstalled', () => {
    refreshInstallBtn();
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
