name: Trigger Regression Tests

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    name: Dispatch regression suite
    steps:
      - name: Trigger badmintonAppRegression workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REGRESSION_PAT }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'rajeshmokaalla',
              repo: 'badmintonAppRegression',
              event_type: 'app-deployed',
              client_payload: {
                source_repo: context.repo.repo,
                commit_sha: context.sha,
                commit_message: context.payload.head_commit?.message ?? '',
                triggered_by: context.actor,
              },
            });
            console.log('Regression dispatch sent for commit', context.sha);
