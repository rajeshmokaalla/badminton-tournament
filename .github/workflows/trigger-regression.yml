name: Trigger Regression Tests

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    name: Dispatch regression suite
    steps:
      - name: Validate PAT secret is set
        run: |
          if [ -z "${{ secrets.REGRESSION_PAT }}" ]; then
            echo "::error::REGRESSION_PAT secret is not set. Create a GitHub PAT with 'repo' scope and add it as a secret named REGRESSION_PAT in this repository's settings."
            exit 1
          fi

      - name: Trigger badmintonAppRegression workflow
        run: |
          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.REGRESSION_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/rajeshmokaalla/badmintonAppRegression/dispatches \
            -d '{
              "event_type": "app-deployed",
              "client_payload": {
                "source_repo": "${{ github.event.repository.name }}",
                "commit_sha": "${{ github.sha }}",
                "commit_message": "${{ github.event.head_commit.message }}",
                "triggered_by": "${{ github.actor }}"
              }
            }'
          echo "Regression dispatch sent for commit ${{ github.sha }}"
