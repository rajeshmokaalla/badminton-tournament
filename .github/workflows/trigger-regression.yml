name: Trigger Regression Tests

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    name: Dispatch regression suite
    steps:
      - name: Validate PAT secret is set
        run: |
          if [ -z "${{ secrets.REGRESSION_PAT }}" ]; then
            echo "::error::REGRESSION_PAT secret is not set. Create a GitHub PAT with 'repo' scope and add it as a secret named REGRESSION_PAT in this repository's settings."
            exit 1
          fi

      - name: Trigger badmintonAppRegression workflow
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          payload=$(jq -n \
            --arg event_type "app-deployed" \
            --arg source_repo "${{ github.event.repository.name }}" \
            --arg commit_sha "${{ github.sha }}" \
            --arg commit_message "$COMMIT_MESSAGE" \
            --arg triggered_by "${{ github.actor }}" \
            '{
              event_type: $event_type,
              client_payload: {
                source_repo: $source_repo,
                commit_sha: $commit_sha,
                commit_message: $commit_message,
                triggered_by: $triggered_by
              }
            }')

          curl -f -X POST \
            -H "Authorization: Bearer ${{ secrets.REGRESSION_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/rajeshmokaalla/badmintonAppRegression/dispatches \
            -d "$payload"
          echo "Regression dispatch sent for commit ${{ github.sha }}"
